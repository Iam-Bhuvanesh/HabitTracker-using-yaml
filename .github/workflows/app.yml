name: 6AM Habit Tracker Pro
on:
  issues:
    types: [opened]
  schedule:
    # 06:00 AM IST (UTC+5:30) is 00:30 UTC
    - cron: '30 0 * * *' 

permissions:
  contents: write
  issues: write

jobs:
  sync_app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Process Logic
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # 1. Clean input
          CLEAN_TITLE=$(echo "$ISSUE_TITLE" | xargs | tr '[:upper:]' '[:lower:]')

          # --- PATH A: THE 6:00 AM RESET ---
          if [ "$EVENT_NAME" = "schedule" ]; then
            jq 'map(.completed = false)' database.json > temp.json && mv temp.json database.json

          # --- PATH B: REMOVE TASK ---
          elif [[ "$CLEAN_TITLE" == remove* ]]; then
            TARGET=$(echo "$CLEAN_TITLE" | sed 's/^remove //')
            jq --arg T "$TARGET" 'del(.[] | select(.task | ascii_downcase == ($T | ascii_downcase)))' database.json > temp.json && mv temp.json database.json

          # --- PATH C: MARK AS DONE ---
          elif [[ "$CLEAN_TITLE" == done* ]]; then
            TARGET=$(echo "$CLEAN_TITLE" | sed 's/^done //')
            jq --arg T "$TARGET" 'map(if .task | ascii_downcase == ($T | ascii_downcase) then .completed = true else . end)' database.json > temp.json && mv temp.json database.json

          # --- PATH D: ADD NEW TASK ---
          else
            # Adds as incomplete [ ] by default
            jq --arg T "$ISSUE_TITLE" '. + [{"task": $T, "completed": false}]' database.json > temp.json && mv temp.json database.json
          fi

      - name: Update README
        run: |
          echo "# ☀️ Daily Dashboard" > README.md
          echo "Last Synced: $(date)" >> README.md
          echo -e "\n### My Tasks" >> README.md
          # Rebuilds the list from scratch so deleted tasks disappear
          jq -r '.[] | if .completed then "- [x] \(.task)" else "- [ ] \(.task)" end' database.json >> README.md

      - name: Save Changes
        run: |
          git config --global user.name "HabitBot"
          git config --global user.email "bot@github.com"
          git add database.json README.md
          git commit -m "Sync: $EVENT_NAME" || exit 0
          git push

      - name: Close Issue
        if: github.event_name == 'issues'
        run: gh issue close ${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
