name: Habit Tracker
on:
  issues:
    types: [opened]
  schedule:
    - cron: '30 0 * * *'

permissions:
  contents: write
  issues: write

jobs:
  sync_app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Process Logic
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # 1. CLEANUP: Trim spaces and handle case
          # This turns "  REMOVE  Exercise  " into "remove exercise"
          CLEAN_TITLE=$(echo "$ISSUE_TITLE" | xargs | tr '[:upper:]' '[:lower:]')

          # --- PATH A: THE 6:00 AM RESET ---
          if [ "$EVENT_NAME" = "schedule" ]; then
            jq 'map(.completed = false)' database.json > temp.json && mv temp.json database.json

          # --- PATH B: REMOVE TASK ---
          # Checks if the clean title starts with "remove "
          elif [[ "$CLEAN_TITLE" == remove* ]]; then
            # Extract the task name by removing the word "remove "
            TARGET_TASK=$(echo "$CLEAN_TITLE" | sed 's/^remove //')
            
            # Use jq to delete the item. We compare lowercase to lowercase.
            jq --arg T "$TARGET_TASK" 'del(.[] | select(.task | ascii_downcase == ($T | ascii_downcase)))' database.json > temp.json && mv temp.json database.json
            echo "Deleted task: $TARGET_TASK"

          # --- PATH C: COMPLETE TASK ---
          else
            # Set to true if exists, or add new if it doesn't.
            jq --arg T "$ISSUE_TITLE" '
              if any(.[]; .task == $T) 
              then map(if .task == $T then .completed = true else . end)
              else . + [{"task": $T, "completed": true}] 
              end' database.json > temp.json && mv temp.json database.json
          fi

      - name: Update README
        run: |
          echo "# ☀️ Daily Dashboard" > README.md
          echo "Last Synced: $(date)" >> README.md
          echo -e "\n### My Tasks" >> README.md
          jq -r '.[] | if .completed then "- [x] \(.task)" else "- [ ] \(.task)" end' database.json >> README.md

      - name: Save and Push
        run: |
          git config --global user.name "HabitBot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Automated Update: $EVENT_NAME" || exit 0
          git push

      - name: Close Issue
        if: github.event_name == 'issues'
        run: gh issue close ${{ github.event.issue.number }} --comment "Done!"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
