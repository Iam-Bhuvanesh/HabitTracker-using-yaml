name: Habit Tracker Pro (Clean Edition)
on:
  issues:
    types: [opened]
  schedule:
    - cron: '30 0 * * *' # Daily 6:00 AM IST Reset
    - cron: '0 0 * * 0'  # Weekly Sunday Midnight Cleanup (The Janitor)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync_app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Process Logic
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # 1. Standardize Inputs
          CLEAN_TITLE=$(echo "$ISSUE_TITLE" | xargs)
          LOWER_TITLE=$(echo "$CLEAN_TITLE" | tr '[:upper:]' '[:lower:]')

          # --- PATH A: THE JANITOR (Sunday Cleanup) ---
          if [ "$EVENT_NAME" = "schedule" ] && [ "$(date +%u)" = "7" ]; then
            echo "Cleaning up old issue logs..."
            # Deletes all closed issues with the habit-log label
            gh issue list --state closed --label "habit-log" --limit 1000 --json number --jq '.[].number' | xargs -I {} gh issue delete {} --yes
          fi

          # --- PATH B: 6:00 AM RESET OR REFRESH ---
          if [ "$EVENT_NAME" = "schedule" ] || [ "$LOWER_TITLE" = "refresh" ]; then
            jq 'map(.completed = false)' database.json > temp.json && mv temp.json database.json

          # --- PATH C: REMOVE TASK ---
          elif [[ "$LOWER_TITLE" == remove* ]]; then
            TARGET=$(echo "$CLEAN_TITLE" | sed -E 's/^[Rr][Ee][Mm][Oo][Vv][Ee][[:space:]]*//')
            jq --arg T "$TARGET" 'del(.[] | select(.task | ascii_downcase == ($T | ascii_downcase)))' database.json > temp.json && mv temp.json database.json

          # --- PATH D: MARK AS DONE ---
          elif [[ "$LOWER_TITLE" == done* ]]; then
            TARGET=$(echo "$CLEAN_TITLE" | sed -E 's/^[Dd][Oo][Nn][Ee][[:space:]]*//')
            jq --arg T "$TARGET" 'map(if .task | ascii_downcase == ($T | ascii_downcase) then .completed = true else . end)' database.json > temp.json && mv temp.json database.json

          # --- PATH E: ADD NEW TASK ---
          elif [ "$EVENT_NAME" = "issues" ]; then
            jq --arg T "$CLEAN_TITLE" 'if any(.[]; .task == $T) then . else . + [{"task": $T, "completed": false}] end' database.json > temp.json && mv temp.json database.json
          fi

      - name: Rebuild README
        run: |
          echo "# ☀️ Daily Dashboard" > README.md
          echo "Last Update: $(date)" >> README.md
          echo -e "\n### My Tasks" >> README.md
          echo "To add a task, [click here](https://github.com/${{ github.repository }}/issues/new?title=New%20Task%20Name)." >> README.md
          echo -e "\n---\n" >> README.md
          jq -r '.[] | if .completed then "- [x] \(.task)" else "- [ ] \(.task) ➔ [ [Tick It](https://github.com/${{ github.repository }}/issues/new?title=DONE%20\(.task|@uri)) ]" end' database.json >> README.md

      - name: Force Save
        run: |
          git config --global user.name "HabitBot"
          git config --global user.email "bot@github.com"
          git add database.json README.md
          git commit -m "Automated Dashboard Update" || exit 0
          git push origin main

      - name: Label and Close Issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          # Create label if it doesn't exist, then label and close
          gh label create "habit-log" --color "FBCA04" --description "Habit Tracker Logs" || true
          gh issue edit $ISSUE_NUM --add-label "habit-log"
          gh issue close $ISSUE_NUM
