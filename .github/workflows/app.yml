name: Habit Tracker
on:
  issues:
    types: [opened]
  schedule:
    - cron: '30 0 * * *'

permissions:
  contents: write
  issues: write

jobs:
  sync_app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Process Logic
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # 1. Clean the input (Lowercase and Trim)
          CLEAN_TITLE=$(echo "$ISSUE_TITLE" | xargs | tr '[:upper:]' '[:lower:]')

          # --- PATH A: THE 6:00 AM RESET ---
          if [ "$EVENT_NAME" = "schedule" ]; then
            jq 'map(.completed = false)' database.json > temp.json && mv temp.json database.json

          # --- PATH B: REMOVE TASK (Aggressive match) ---
          elif [[ "$CLEAN_TITLE" == remove* ]]; then
            # Extract the task name after 'remove '
            TARGET=$(echo "$CLEAN_TITLE" | sed 's/^remove //')
            # Delete any task that matches the name (ignoring case)
            jq --arg T "$TARGET" 'del(.[] | select(.task | ascii_downcase == ($T | ascii_downcase)))' database.json > temp.json && mv temp.json database.json
            echo "Successfully purged: $TARGET"

          # --- PATH C: ADD OR COMPLETE ---
          else
            # NEW LOGIC: 
            # 1. If task exists: set to completed = true.
            # 2. If task is new: add to list as completed = false.
            jq --arg T "$ISSUE_TITLE" '
              if any(.[]; .task == $T) 
              then map(if .task == $T then .completed = true else . end)
              else . + [{"task": $T, "completed": false}] 
              end' database.json > temp.json && mv temp.json database.json
          fi

      - name: Fresh README Build
        run: |
          # We overwrite the README entirely every time to ensure no 'ghost' tasks remain
          echo "# ☀️ Daily Dashboard" > README.md
          echo "Sync Time: $(date)" >> README.md
          echo -e "\n### Active Habits" >> README.md
          
          # Only pull tasks that actually exist in the database.json right now
          jq -r '.[] | if .completed then "- [x] \(.task)" else "- [ ] \(.task)" end' database.json >> README.md

      - name: Update README
        run: |
          echo "# ☀️ Daily Dashboard" > README.md
          echo "Last Synced: $(date)" >> README.md
          echo -e "\n### My Tasks" >> README.md
          jq -r '.[] | if .completed then "- [x] \(.task)" else "- [ ] \(.task)" end' database.json >> README.md

      - name: Save and Push
        run: |
          git config --global user.name "HabitBot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Automated Update: $EVENT_NAME" || exit 0
          git push

      - name: Close Issue
        if: github.event_name == 'issues'
        run: gh issue close ${{ github.event.issue.number }} --comment "Done!"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
